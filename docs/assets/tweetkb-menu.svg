<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">TweetKB terminal menu</title>
  <desc id="desc">A terminal preview showing the TweetKB interactive menu.</desc>
  <rect width="960" height="620" rx="18" fill="#111827"/>
  <rect x="24" y="24" width="912" height="572" rx="12" fill="#0b1020" stroke="#243044"/>
  <circle cx="58" cy="54" r="7" fill="#ef4444"/>
  <circle cx="82" cy="54" r="7" fill="#f59e0b"/>
  <circle cx="106" cy="54" r="7" fill="#22c55e"/>
  <text x="44" y="96" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">$ tweetkb</text>
  <text x="44" y="140" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700" fill="#f8fafc">TweetKB</text>
  <text x="44" y="174" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#93c5fd">Local bookmark knowledge base</text>
  <text x="44" y="220" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">1. Initialize database</text>
  <text x="44" y="252" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">2. Open login browser</text>
  <text x="44" y="284" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">3. Collect bookmarks</text>
  <text x="44" y="316" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">4. Analyze bookmarks</text>
  <text x="44" y="348" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">5. Enrich saved bookmarks</text>
  <text x="44" y="380" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">6. Export</text>
  <text x="44" y="412" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">7. Review</text>
  <text x="44" y="444" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">8. Stats</text>
  <text x="468" y="220" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">9. Generate clusters</text>
  <text x="468" y="252" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">10. Generate project ideas</text>
  <text x="468" y="284" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">11. Export graph</text>
  <text x="468" y="316" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">12. TweetZip compression</text>
  <text x="468" y="348" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">13. Start review UI</text>
  <text x="468" y="380" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">14. Doctor</text>
  <text x="468" y="412" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">15. Release audit</text>
  <text x="468" y="444" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#d1d5db">16. Run custom command</text>
  <text x="44" y="512" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#a7f3d0">0. Quit</text>
  <text x="44" y="552" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#f8fafc">Select: </text>
  <rect x="132" y="535" width="12" height="24" fill="#f8fafc">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
