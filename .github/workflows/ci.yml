name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests
        run: uv run pytest -v

      - name: Type check
        run: uv run python -m py_compile src/tweetkb/*.py src/tweetkb/**/*.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check syntax
        run: uv run python -m compileall src tests

      - name: Verify imports
        run: |
          uv run python -c "
          import tweetkb
          from tweetkb import db, classifier, entities, embeddings, analyzer
          from tweetkb.clusters import generate_clusters
          from tweetkb.compress import encode_records, decode_records
          from tweetkb.config import load_config
          from tweetkb.exporters import export_obsidian, export_logseq
          from tweetkb.migrations import migrate, SCHEMA_VERSION
          from tweetkb.review import ReviewManager
          "
